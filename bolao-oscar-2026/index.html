// ==================== CHECK ALREADY VOTED ====================
function checkAlreadyVoted() {
  const saved = localStorage.getItem('bolao-oscar-2026');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      showAlreadyVoted(data);
      return true;
    } catch(e) { /* corrupted, allow re-vote */ }
  }
  return false;
}

function showAlreadyVoted(data) {
  const container = $('already-summary');
  container.innerHTML = data.picks
    ? Object.entries(data.picks).map(([cat, pick]) =>
        `<div class="summary-item"><span class="summary-cat">${esc(cat)}</span><span class="summary-pick">${esc(pick)}</span></div>`
      ).join('')
    : '';
  showScreen('already');
}

// ==================== SCREENS ====================
function showScreen(name) {
  [screenName, screenVote, screenConfirm, screenAlready].forEach(s => s.classList.remove('active'));
  submitBar.style.display = 'none';

  if (name === 'name') screenName.classList.add('active');
  else if (name === 'vote') { screenVote.classList.add('active'); submitBar.style.display = ''; }
  else if (name === 'confirm') screenConfirm.classList.add('active');
  else if (name === 'already') screenAlready.classList.add('active');
}

}

// ==================== IMDB FUNCTIONS ====================
function getImdbUrl(nominee) {
  // Direct lookup first
  if (IMDB_URLS[nominee]) return { url: IMDB_URLS[nominee], film: nominee, poster: POSTER_URLS[nominee] || null };

  // Remove country in parentheses: "The Secret Agent (Brasil)" → "The Secret Agent"
  const withoutCountry = nominee.replace(/\s*\([^)]+\)\s*$/, '');
  if (IMDB_URLS[withoutCountry]) return { url: IMDB_URLS[withoutCountry], film: withoutCountry, poster: POSTER_URLS[withoutCountry] || null };

  // Split by " — " and try last part (e.g. "Ryan Coogler — Sinners" → "Sinners")
  if (nominee.includes(' \u2014 ')) {
    const parts = nominee.split(' \u2014 ');
    const filmPart = parts[parts.length - 1].trim();
    if (IMDB_URLS[filmPart]) return { url: IMDB_URLS[filmPart], film: filmPart, poster: POSTER_URLS[filmPart] || null };
    // Try removing country from film part
    const filmClean = filmPart.replace(/\s*\([^)]+\)\s*$/, '');
    if (IMDB_URLS[filmClean]) return { url: IMDB_URLS[filmClean], film: filmClean, poster: POSTER_URLS[filmClean] || null };
  }

  return null;
}

function openImdb(url, filmName, posterUrl) {
  // Remove existing modal if any
  closeImdb();

  const overlay = document.createElement('div');
  overlay.className = 'imdb-modal-overlay';
  overlay.addEventListener('click', closeImdb);

  const posterHtml = posterUrl && posterUrl !== ''
    ? `<img class="imdb-modal-poster" src="${esc(posterUrl)}" alt="${esc(filmName)}">`
    : '';

  const modal = document.createElement('div');
  modal.className = 'imdb-modal';
  modal.addEventListener('click', e => e.stopPropagation());
  modal.innerHTML = `
    <div class="imdb-modal-titlebar">
      <span>imdb</span>
      <button class="imdb-modal-close" onclick="closeImdb()">&times;</button>
    </div>
    <div class="imdb-modal-body">
      ${posterHtml}
      <div class="imdb-modal-film">${esc(filmName)}</div>
      <a href="${esc(url)}" target="_blank" rel="noopener" class="imdb-modal-btn">Ver no IMDb</a>
    </div>
  `;

  document.body.appendChild(overlay);
  document.body.appendChild(modal);
}

function closeImdb() {
  const overlay = document.querySelector('.imdb-modal-overlay');
  const modal = document.querySelector('.imdb-modal');
  if (overlay) overlay.remove();
  if (modal) modal.remove();
}

// ==================== VOTE SCREEN ====================
function buildCategories() {
  progressTotal.textContent = CATEGORIES.length;
  updateProgress();

  categoriesList.innerHTML = CATEGORIES.map((cat, i) => `
    <div class="category" id="cat-${i}">
      <div class="category-title">
        <span class="category-number">${i + 1}.</span> ${esc(cat.name)}
      </div>
      <div class="nominees">
        ${cat.nominees.map(nom => {
          const imdb = getImdbUrl(nom);
          const imdbHtml = imdb ? `<span class="imdb-link" data-imdb-url="${esc(imdb.url)}" data-imdb-film="${esc(imdb.film)}" data-imdb-poster="${esc(imdb.poster || '')}" onclick="event.stopPropagation(); openImdb(this.dataset.imdbUrl, this.dataset.imdbFilm, this.dataset.imdbPoster || '')">imdb</span>` : '';
          return `
          <button class="nominee-tile" data-category="${esc(cat.name)}" data-nominee="${esc(nom)}" onclick="selectNominee(this)">
            <span class="nominee-name">${esc(nom)}</span>
            ${imdbHtml}
          </button>`;
        }).join('')}
      </div>
    </div>
  `).join('');
}

function selectNominee(el) {
  const cat = el.dataset.category;
  const nom = el.dataset.nominee;

  // Deselect siblings
  el.closest('.nominees').querySelectorAll('.nominee-tile').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');

  picks[cat] = nom;
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(picks).length;
  progressCount.textContent = count;
  progressFill.style.width = (count / CATEGORIES.length * 100) + '%';
  btnSubmit.disabled = count < CATEGORIES.length;
}

// ==================== SUBMIT ====================
btnSubmit.addEventListener('click', submitPicks);

async function submitPicks() {
  if (Object.keys(picks).length < CATEGORIES.length) {
    submitError.textContent = 'Vote em todas as categorias antes de enviar.';
    return;
  }

  btnSubmit.disabled = true;
  submitLoading.style.display = '';
  submitError.textContent = '';

  const payload = { name: playerName, picks };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
    });

    if (!res.ok) throw new Error('Erro no servidor');

    // Save to localStorage
    localStorage.setItem('bolao-oscar-2026', JSON.stringify(payload));

    // Show confirmation
    showConfirmation();
  } catch (err) {
    submitError.textContent = 'Erro ao enviar. Tente novamente.';
    btnSubmit.disabled = false;
  } finally {
    submitLoading.style.display = 'none';
  }
}

function showConfirmation() {
  $('confirm-name').textContent = playerName;
  $('confirm-summary').innerHTML = Object.entries(picks).map(([cat, pick]) =>
    `<div class="summary-item"><span class="summary-cat">${esc(cat)}</span><span class="summary-pick">${esc(pick)}</span></div>`
  ).join('');
  showScreen('confirm');
  window.scrollTo(0, 0);
}

function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ==================== RAINBOWIZE ====================
function rainbowize(el, delayStep) {
  const text = el.textContent;
  el.innerHTML = '';
  let i = 0;
  for (const ch of text) {
    if (ch === ' ' || ch === '\n') {
      el.appendChild(document.createTextNode(ch));
    } else {
      const span = document.createElement('span');
      span.className = 'c';
      span.textContent = ch;
      span.style.animationDelay = (i * (delayStep || 0.1)) + 's';
      el.appendChild(span);
      i++;
    }
  }
}
rainbowize(document.querySelector('.header h1'), 0.1);
