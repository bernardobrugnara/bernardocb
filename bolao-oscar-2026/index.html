// ==================== STATE ====================
const picks = {};
let playerName = '';

// ==================== ELEMENTS ====================
const $ = id => document.getElementById(id);

const screenName = $('screen-name');
const screenVote = $('screen-vote');
const screenConfirm = $('screen-confirm');
const screenAlready = $('screen-already');
const nameInput = $('player-name');
const btnEnter = $('btn-enter');
const nameError = $('name-error');
const categoriesList = $('categories-list');
const progressCount = $('progress-count');
const progressTotal = $('progress-total');
const progressFill = $('progress-fill');
const submitBar = $('submit-bar');
const btnSubmit = $('btn-submit');
const submitLoading = $('submit-loading');
const submitError = $('submit-error');

// ==================== CHECK ALREADY VOTED ====================
function checkAlreadyVoted() {
  const saved = localStorage.getItem('bolao-oscar-2026');
  if (saved) {
    try {
      const data = JSON.parse(saved);
      showAlreadyVoted(data);
      return true;
    } catch(e) { /* corrupted, allow re-vote */ }
  }
  return false;
}

function showAlreadyVoted(data) {
  const container = $('already-summary');
  container.innerHTML = data.picks
    ? Object.entries(data.picks).map(([cat, pick]) =>
        `<div class="summary-item"><span class="summary-cat">${esc(cat)}</span><span class="summary-pick">${esc(pick)}</span></div>`
      ).join('')
    : '';
  showScreen('already');
}

// ==================== SCREENS ====================
function showScreen(name) {
  [screenName, screenVote, screenConfirm, screenAlready].forEach(s => s.classList.remove('active'));
  submitBar.style.display = 'none';

  if (name === 'name') screenName.classList.add('active');
  else if (name === 'vote') { screenVote.classList.add('active'); submitBar.style.display = ''; }
  else if (name === 'confirm') screenConfirm.classList.add('active');
  else if (name === 'already') screenAlready.classList.add('active');
}

// ==================== NAME SCREEN ====================
nameInput.addEventListener('input', () => {
  btnEnter.disabled = nameInput.value.trim().length === 0;
  nameError.textContent = '';
});

nameInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !btnEnter.disabled) startVoting();
});

btnEnter.addEventListener('click', startVoting);

function startVoting() {
  const name = nameInput.value.trim();
  if (!name) { nameError.textContent = 'Digite seu nome.'; return; }
  playerName = name;
  buildCategories();
  showScreen('vote');
  window.scrollTo(0, 0);
}

// ==================== VOTE SCREEN ====================
function buildCategories() {
  progressTotal.textContent = CATEGORIES.length;
  updateProgress();

  categoriesList.innerHTML = CATEGORIES.map((cat, i) => `
    <div class="category" id="cat-${i}">
      <div class="category-title">
        <span class="category-number">${i + 1}.</span> ${esc(cat.name)}
      </div>
      <div class="nominees">
        ${cat.nominees.map(nom => `
          <button class="nominee-tile" data-category="${esc(cat.name)}" data-nominee="${esc(nom)}" onclick="selectNominee(this)">
            <span class="nominee-name">${esc(nom)}</span>
          </button>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function selectNominee(el) {
  const cat = el.dataset.category;
  const nom = el.dataset.nominee;

  // Deselect siblings
  el.closest('.nominees').querySelectorAll('.nominee-tile').forEach(t => t.classList.remove('selected'));
  el.classList.add('selected');

  picks[cat] = nom;
  updateProgress();
}

function updateProgress() {
  const count = Object.keys(picks).length;
  progressCount.textContent = count;
  progressFill.style.width = (count / CATEGORIES.length * 100) + '%';
  btnSubmit.disabled = count < CATEGORIES.length;
}

// ==================== SUBMIT ====================
btnSubmit.addEventListener('click', submitPicks);

async function submitPicks() {
  if (Object.keys(picks).length < CATEGORIES.length) {
    submitError.textContent = 'Vote em todas as categorias antes de enviar.';
    return;
  }

  btnSubmit.disabled = true;
  submitLoading.style.display = '';
  submitError.textContent = '';

  const payload = { name: playerName, picks };

  try {
    const res = await fetch(APPS_SCRIPT_URL, {
      method: 'POST',
      body: JSON.stringify(payload),
      headers: { 'Content-Type': 'text/plain' }
    });

    if (!res.ok) throw new Error('Erro no servidor');

    // Save to localStorage
    localStorage.setItem('bolao-oscar-2026', JSON.stringify(payload));

    // Show confirmation
    showConfirmation();
  } catch (err) {
    submitError.textContent = 'Erro ao enviar. Tente novamente.';
    btnSubmit.disabled = false;
  } finally {
    submitLoading.style.display = 'none';
  }
}

function showConfirmation() {
  $('confirm-name').textContent = playerName;
  $('confirm-summary').innerHTML = Object.entries(picks).map(([cat, pick]) =>
    `<div class="summary-item"><span class="summary-cat">${esc(cat)}</span><span class="summary-pick">${esc(pick)}</span></div>`
  ).join('');
  showScreen('confirm');
  window.scrollTo(0, 0);
}

// ==================== UTILS ====================
function esc(s) {
  const d = document.createElement('div');
  d.textContent = s;
  return d.innerHTML;
}

// ==================== RAINBOWIZE ====================
function rainbowize(el, delayStep) {
  const text = el.textContent;
  el.innerHTML = '';
  let i = 0;
  for (const ch of text) {
    if (ch === ' ' || ch === '\n') {
      el.appendChild(document.createTextNode(ch));
    } else {
      const span = document.createElement('span');
      span.className = 'c';
      span.textContent = ch;
      span.style.animationDelay = (i * (delayStep || 0.1)) + 's';
      el.appendChild(span);
      i++;
    }
  }
}
rainbowize(document.querySelector('.header h1'), 0.1);

// ==================== INIT ====================
if (!checkAlreadyVoted()) {
  showScreen('name');
  nameInput.focus();
}
</script>
